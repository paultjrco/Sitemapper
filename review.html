<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitemap Review</title>
<style>
  html, body { margin: 0; height: 100%; background: #f0efeb; }
  iframe { border: 0; width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
<!--
  Client-facing review link. Keeps the URL clean (review.html?sheet=…) while
  reusing the full render engine in index.html. index.html is read-only by
  default (editing needs ?edit=1), so no mode flag is forwarded here — only the
  sheet/tab query string is passed into the iframe.
-->
<iframe id="frame" title="Sitemap review"></iframe>
<script>
  var qs = location.search.slice(1);
  document.getElementById('frame').src = 'index.html' + (qs ? '?' + qs : '');
</script>
</body>
</html>
